# /etc/nginx/sites-available/nis2pt.conf
#
# Nginx reverse proxy for NIS2 Plataforma PT
# Managed by: deploy/nginx.conf
#
# After changing, validate and reload:
#   nginx -t && systemctl reload nginx

# ── Rate limiting zones (mirroring Express rate limiters) ─────────────────
limit_req_zone $binary_remote_addr zone=api_global:10m  rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_scan:10m    rate=5r/h;

# ── Upstream ──────────────────────────────────────────────────────────────
upstream nis2_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nis2pt.pt www.nis2pt.pt;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nis2pt.pt www.nis2pt.pt;

    # ── SSL (managed by certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/nis2pt.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nis2pt.pt/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Request limits ────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Static assets (served from dist/public) ───────────────────────────
    # Vite output: long-lived cache for hashed bundles
    location ~* \.(js|css|woff2?|ico|png|svg|jpg|webp)$ {
        proxy_pass http://nis2_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location /api/oauth {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://nis2_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Stripe webhooks — raw body, no buffering ──────────────────────────
    location /api/webhooks {
        proxy_pass              http://nis2_app;
        proxy_http_version      1.1;
        proxy_request_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── General API ───────────────────────────────────────────────────────
    location /api {
        limit_req zone=api_global burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://nis2_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SPA fallback — all other requests go to React app ─────────────────
    location / {
        proxy_pass         http://nis2_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check — no logs ────────────────────────────────────────────
    location = /health {
        proxy_pass http://nis2_app;
        access_log off;
    }
}
